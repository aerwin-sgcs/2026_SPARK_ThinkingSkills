*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1818;
  --ink2: #3d3a3a;
  --ink3: #8a8690;
  --paper: #ffffff;
  --paper2: #f4f3f6;
  --paper3: #e8e5ee;
  --accent: #FF6F61;
  --sidebar-bg: #2D2640;
  --task-full: #88B04B;
  --task-tint: rgba(136,176,75,0.18);
  --task-border: rgba(136,176,75,0.35);
  --task-text: #ffffff;
  --task-tag-bg: rgba(255,255,255,0.22);
  --radius: 10px;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
}

html { height: 100%; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100%; line-height: 1.6; -webkit-text-size-adjust: 100%; }

/* ── LAYOUT ── */
.app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; align-items: flex-start; }

/* ── SIDEBAR ── */
.sidebar {
  background: #f3efe6;
  color: #2E2748;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 1.75rem 1rem 2rem;
  position: sticky;
  top: 0;
  border-right: 1px solid #e0d9c9;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: #cdc6b8 transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #cdc6b8; border-radius: 4px; }

.sidebar-brand { margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid #e0d9c9; }
.sidebar-brand h1 { font-family: var(--serif); font-size: 16px; font-weight: 700; line-height: 1.2; color: #2E2748; }
.sidebar-brand p { font-size: 10.5px; color: #6B6080; margin-top: 3px; }

.sidebar-section { font-size: 8.5px; letter-spacing: 2px; text-transform: uppercase; color: #807495; margin: 1.1rem 0 0.35rem; font-weight: 600; padding-left: 6px; }

.task-btn {
  display: flex; align-items: flex-start; gap: 8px;
  width: 100%; background: transparent; border: none;
  color: #4A3F60; font-family: var(--sans); font-size: 12px;
  font-weight: 400; text-align: left; padding: 5px 6px;
  border-radius: 5px; cursor: pointer;
  transition: background 0.12s, color 0.12s;
  line-height: 1.35;
  -webkit-tap-highlight-color: transparent;
}
.task-btn:hover { background: rgba(46,39,72,0.06); color: #2E2748; }
.task-btn.active { background: rgba(255,111,97,0.18); color: #2E2748; font-weight: 500; }
.task-num { font-family: var(--serif); font-size: 11.5px; font-weight: 700; color: #9b8db8; min-width: 18px; flex-shrink: 0; padding-top: 1px; }
.task-btn.active .task-num { color: #FF6F61; }

/* ── MAIN ── */
.main { min-width: 0; padding: 2.5rem 3rem 3rem; }

/* ── MENU TOGGLE (tablet/mobile only) ── */
.menu-toggle {
  display: none;
  position: fixed; top: 0.9rem; left: 0.9rem; z-index: 100;
  background: var(--sidebar-bg); color: #f0ece4;
  border: none; border-radius: 7px;
  width: 40px; height: 40px; font-size: 18px;
  cursor: pointer; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 40;
}
.overlay.visible { display: block; }

/* ── TASK CARD ── */
.task-card { border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }

.task-card-top {
  background: var(--task-full);
  padding: 1.75rem 2rem 1.6rem;
  position: relative;
  overflow: hidden;
  min-height: 140px;
}
.task-card-top::after {
  content: attr(data-num);
  font-family: var(--serif);
  font-size: 96px; font-weight: 700; line-height: 1;
  opacity: 0.12; position: absolute;
  top: 0.5rem; right: 1.25rem;
  letter-spacing: -3px; color: #fff; pointer-events: none;
}
.task-number {
  font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.65); margin-bottom: 8px; font-weight: 500;
}
.task-title {
  font-family: var(--serif); font-size: 20px; font-weight: 700;
  line-height: 1.25; color: #ffffff; margin-bottom: 8px;
}
.tag {
  display: inline-block; font-size: 10.5px; font-weight: 500;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 12px;
  background: rgba(255,255,255,0.22); color: #ffffff;
}
.task-prompt {
  font-family: var(--serif); font-style: italic;
  font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.9);
  border-left: 3px solid rgba(255,255,255,0.3); padding-left: 1rem;
}

/* ── TASK SURROUND (tinted writing area) ── */
.task-surround {
  background: var(--task-tint);
  padding: 1.5rem 2rem 1.75rem;
}

.meta-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.meta-input {
  border: 1.5px solid var(--task-border); border-radius: 7px;
  padding: 8px 13px; font-family: var(--sans); font-size: 14px;
  background: rgba(255,255,255,0.6); color: var(--ink); outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.meta-input:focus { border-color: var(--accent); }
.date-display { font-size: 12px; color: var(--ink3); margin-left: auto; }

.word-counter {
  display: none; font-size: 12px; color: var(--task-border);
  text-align: right; margin-bottom: 6px; transition: color 0.2s;
}
.word-counter.visible { display: block; }
.word-counter .wc-num { font-weight: 500; color: var(--ink2); }
.word-counter.at-100 .wc-num { color: #88B04B; font-weight: 600; }
.word-counter.over-100 .wc-num { color: #FF6F61; font-weight: 600; }
.word-counter.near-50 .wc-num { color: #6B5B93; }

.response-label {
  font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--task-border); margin-bottom: 0.6rem;
  display: flex; align-items: center; gap: 8px; font-weight: 500;
}
.response-label::after { content: ''; flex: 1; height: 1px; background: var(--task-border); }

.response-box {
  width: 100%; min-height: 320px;
  background: #fff; border: 1.5px solid rgba(255,255,255,0.8);
  border-radius: var(--radius); padding: 1.1rem 1.35rem;
  font-family: var(--sans); font-size: 15px; line-height: 1.8;
  color: var(--ink); resize: vertical; outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
}
.response-box:focus { border-color: var(--accent); }
.response-box::placeholder { color: #b8b4c0; font-style: italic; }

/* ── ACTIONS ── */
.actions { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 1rem; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: 8px;
  font-family: var(--sans); font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  border: 1.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #e55a4c; border-color: #e55a4c; }
.btn-outline { background: transparent; border-color: var(--paper3); color: var(--ink2); }
.btn-outline:hover { border-color: var(--ink3); background: var(--paper2); }
.btn-danger { background: transparent; border-color: #f0c8c0; color: #b04030; }
.btn-danger:hover { background: #fef0ee; }

/* ── SCREENSHOT PANEL ── */
.screenshot-panel {
  display: none; background: #faf8fb;
  border: 1px solid var(--paper3); border-radius: var(--radius);
  padding: 1.75rem 2rem; margin-bottom: 1.5rem;
}
.screenshot-panel.visible { display: block; }
.screenshot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--paper3); flex-wrap: wrap; gap: 6px; }
.screenshot-branding { font-family: var(--serif); font-size: 13px; color: var(--ink3); font-style: italic; }
.screenshot-meta { font-size: 12px; color: var(--ink3); }
.screenshot-task-title { font-family: var(--serif); font-size: 19px; font-weight: 700; margin-bottom: 0.4rem; }
.screenshot-prompt { font-size: 13.5px; color: var(--ink2); font-style: italic; font-family: var(--serif); border-left: 3px solid var(--accent); padding-left: 0.9rem; margin: 0.6rem 0 1.1rem; line-height: 1.6; }
.screenshot-student { font-size: 12px; color: var(--ink3); margin-bottom: 0.85rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }
.screenshot-response-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink3); margin-bottom: 0.5rem; font-weight: 500; }
.screenshot-response { background: #fff; border: 1px solid var(--paper3); border-radius: 8px; padding: 1.1rem 1.35rem; font-size: 14.5px; line-height: 1.75; color: var(--ink); white-space: pre-wrap; min-height: 100px; }

/* ── NAV ── */
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; gap: 1rem; }
.nav-btn {
  display: flex; align-items: center; gap: 5px;
  background: transparent; border: 1.5px solid var(--paper3);
  border-radius: 8px; padding: 9px 16px;
  font-family: var(--sans); font-size: 13.5px; color: var(--ink2);
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.task-progress { font-size: 12px; color: var(--ink3); }

/* ── DOWNLOAD ALL ── */
.download-all-row {
  margin-top: 1.5rem; padding-top: 1.25rem;
  border-top: 1px solid var(--paper3);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.btn-download-all {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 22px; border-radius: 8px;
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  cursor: pointer; border: none;
  background: var(--sidebar-bg); color: #fff;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-download-all:hover { background: #3d3258; }
.btn-download-all.btn-secondary { background: transparent; color: var(--ink2); border: 1px solid var(--paper3); }
.btn-download-all.btn-secondary:hover { background: var(--paper2); }
.btn-download-all.btn-clear-all { background: transparent; color: #b04a3f; border: 1px solid rgba(176,74,63,0.35); margin-left: auto; }
.btn-download-all.btn-clear-all:hover { background: rgba(176,74,63,0.08); }
.download-all-hint { font-size: 12px; color: var(--ink3); font-style: italic; }
.framework-link {
  margin: 1.5rem 0 0;
  padding: 0.9rem 1.1rem;
  font-size: 12.5px;
  font-style: italic;
  text-align: center;
  border: 1.5px solid rgba(107,91,147,0.45);
  border-radius: 10px;
  background: rgba(107,91,147,0.06);
}
.framework-link a { color: var(--ink2); text-decoration: none; border-bottom: 1px dotted var(--ink2); padding: 0 2px; }
.framework-link a:hover { color: var(--ink); border-bottom-color: var(--ink); background: rgba(107,91,147,0.10); }
.framework-link .sep { color: var(--ink3); margin: 0 0.5rem; font-style: normal; }

/* ── NOTIFICATION ── */
.notif {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--sidebar-bg); color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none; z-index: 200;
  font-family: var(--sans); max-width: calc(100vw - 3rem);
}
.notif.show { opacity: 1; transform: translateY(0); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-card { animation: fadeUp 0.25s ease; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .menu-toggle { display: flex; }
  .sidebar {
    position: fixed; top: 0; left: 0; height: 100vh;
    width: 260px; padding-top: 3.5rem;
    transform: translateX(-100%);
    transition: transform 0.28s ease; z-index: 50;
  }
  .sidebar.open { transform: translateX(0); }
  .main { padding: 1.25rem 1.5rem 5rem; padding-top: 4rem; }
}
@media (max-width: 520px) {
  .task-title { font-size: 17px; }
  .task-card-top { padding: 1.25rem; }
  .task-surround { padding: 1.25rem; }
  .main { padding: 1rem 1rem 5rem; padding-top: 4rem; }
  .actions { gap: 7px; }
  .btn { padding: 9px 14px; font-size: 13px; }
  .nav-btn { padding: 8px 12px; font-size: 12.5px; }
  .meta-input { font-size: 16px; }
  .response-box { font-size: 16px; min-height: 260px; }
  .notif { bottom: 1rem; right: 1rem; left: 1rem; text-align: center; }
}
</style>
</head>

<script>
var TASKS = [
  { section:"Inquiry & Investigation", title:"Design a Study That Doesn’t Exist Yet", tag:"STEM", tagClass:"tag-stem", prompt:"Identify a gap in knowledge you genuinely care about. Write a full research proposal: hypothesis, method, ethical considerations, and how you’d analyse results — without running the experiment." },
  { section:"Inquiry & Investigation", title:"Reverse-Engineer a News Headline", tag:"Humanities", tagClass:"tag-hum", prompt:"Choose a headline and work backwards: find the original source data, identify what was left out, and rewrite the headline in three different ways to shift the reader’s perception without lying." },
  { section:"Inquiry & Investigation", title:"Map the Butterfly Effects", tag:"Humanities", tagClass:"tag-hum", prompt:"Pick one historical decision and trace at least five unexpected downstream consequences across different domains — politics, technology, culture, science. Present as a cause-and-consequence web." },
  { section:"Inquiry & Investigation", title:"Spot the Flaw in a Famous Model", tag:"STEM", tagClass:"tag-stem", prompt:"Choose a well-known scientific model or theory (e.g. food pyramid, Maslow’s hierarchy, Bohr atom). Research its original limitations and how modern science has revised or replaced it. What does this tell us about knowledge?" },
  { section:"Inquiry & Investigation", title:"Reconstruct an Everyday Reaction", tag:"STEM", tagClass:"tag-stem", prompt:"Choose a chemical reaction you encounter daily — bread rising, rust forming, a battery discharging, a bruise changing colour. Map the bond changes and electron movement at the molecular level. Identify one step chemists still debate, and propose an experiment that could settle it." },
  { section:"Inquiry & Investigation", title:"Decisions Without a Brain", tag:"STEM", tagClass:"tag-stem", prompt:"Pick a non-human organism that appears to make choices — a slime mould, a crow, a mycorrhizal network, a single neuron. Document every ‘decision’ it makes in 24 hours. Where does behaviour end and cognition begin? Defend your line with biological evidence." },
  { section:"Inquiry & Investigation", title:"The Investigation You Don’t Know How to Start", tag:"STEM", tagClass:"tag-stem", prompt:"Pick a question whose answer you genuinely don’t know — and you don’t yet have an obvious method to investigate. Document your first three attempted approaches and exactly why each one stalled. Then propose a method you could only have arrived at after those failures, and explain what each stall taught you about the question itself." },
  { section:"Inquiry & Investigation", title:"When the Result Surprised the Researcher", tag:"Humanities", tagClass:"tag-hum", prompt:"Find a real study where the results didn’t match the researchers’ expectations (e.g. Milgram, the marshmallow test replications, the placebo effect). Reconstruct what they expected, what they actually found, and how they responded. Write a short argument for whether their response showed effective effort or motivated reasoning — and what you would have done differently in their position." },
  { section:"Problem Solving & Design", title:"Solve It with Only What You Have", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Choose a real local problem (e.g. school food waste, traffic near the gates). Design a solution using zero budget and no new technology — only existing resources, behaviour change, or policy." },
  { section:"Problem Solving & Design", title:"Build the Anti-Algorithm", tag:"STEM", tagClass:"tag-stem", prompt:"Most recommendation algorithms optimise for engagement. Design one that optimises for something else — wellbeing, learning, disagreement, or surprise. Write the decision rules and justify every trade-off." },
  { section:"Problem Solving & Design", title:"One Problem, Five Disciplines", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Take a single issue (e.g. loneliness among teenagers). Propose a solution from the perspective of five different fields: engineering, economics, art, biology, and law. Which approach has the most potential? Why?" },
  { section:"Problem Solving & Design", title:"Design for the Edge Case", tag:"Creative", tagClass:"tag-cre", prompt:"Pick any everyday product or system (a door, a timetable, a road sign). Redesign it specifically for the person it currently fails most — a non-reader, a wheelchair user, someone with anxiety. Document every decision." },
  { section:"Problem Solving & Design", title:"Redesign a Building for One Sense", tag:"Creative", tagClass:"tag-cre", prompt:"Choose a public building — a library, train station, hospital, or place of worship. Redesign it for someone who relies on a single sense: only hearing, only touch, only smell. Annotate the floor plan and justify every material, acoustic choice, and pathway. What does it reveal about the senses your original design assumes?" },
  { section:"Problem Solving & Design", title:"Engineer Out the Workaround", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Find a piece of infrastructure people regularly misuse or work around — jaywalked crossings, propped-open fire doors, trolley shortcuts, riverside fences. Don’t punish the behaviour. Redesign the mechanical system so the desired action becomes the easiest one. Document the forces, materials, and trade-offs." },
  { section:"Problem Solving & Design", title:"The Hardest Problem You’ve Stuck With", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Pick a real problem from your own life or community that has resisted easy solutions — peer conflict, a stalled project, a recurring frustration. Document the strategies you’ve already tried, why they failed, and what each failure ruled out. Then propose your next attempt — informed specifically by what the failures taught you, not by a fresh idea." },
  { section:"Problem Solving & Design", title:"Redesign What You Got Wrong First", tag:"Creative", tagClass:"tag-cre", prompt:"Choose something you have designed, built, written, or made that did not work the first time. Document the original design, the failure mode, and the revised design. Then write the case that the failure was necessary: what does the final version contain that you only could have known after the first version failed?" },
  { section:"Language & Communication", title:"Translate the Untranslatable", tag:"Humanities", tagClass:"tag-hum", prompt:"Research words from other languages that have no direct English equivalent (e.g. Japanese mono no aware, German Schadenfreude). Invent an English word for one, write its etymology, and use it in three original sentences." },
  { section:"Language & Communication", title:"Write the Other Side’s Speech", tag:"Philosophy", tagClass:"tag-phi", prompt:"Choose a debate you have strong feelings about. Write the most compelling, fair, and intellectually honest speech you can for the opposing view. Then reflect: did anything change your mind, even slightly?" },
  { section:"Language & Communication", title:"Explain It at Five Levels", tag:"Humanities", tagClass:"tag-hum", prompt:"Choose a complex concept from any subject. Write five explanations of increasing sophistication: for a 5-year-old, a Year 7, a Year 12, a university student, and a working expert. What changes each time?" },
  { section:"Language & Communication", title:"The Misleading Truth", tag:"Philosophy", tagClass:"tag-phi", prompt:"Write a short paragraph that contains only true statements but leads the reader to a completely false conclusion. Then annotate each sentence to show exactly how it misleads. What does this reveal about statistics and rhetoric?" },
  { section:"Language & Communication", title:"The Vocabulary of a Field", tag:"Humanities", tagClass:"tag-hum", prompt:"Choose a specialist field — cardiology, structural engineering, jazz improvisation, competitive chess. Collect 20 terms practitioners use that outsiders wouldn’t. Write an essay arguing whether this language is a barrier, a tool, or both, using specific examples. When does jargon protect ideas, and when does it gatekeep them?" },
  { section:"Language & Communication", title:"Define the Indefinable", tag:"Philosophy", tagClass:"tag-phi", prompt:"Choose a word everyone uses but no one defines precisely — fairness, intelligence, alive, healthy, natural. Write three rigorous definitions, each defensible. Then show one real case where each definition delivers a different verdict on the same situation. Which definition would you legislate, and why?" },
  { section:"Language & Communication", title:"Communicate the Thing You Can’t Yet Explain", tag:"Humanities", tagClass:"tag-hum", prompt:"Pick an idea you partly understand but can’t yet articulate cleanly. Write three attempts to explain it — each from a different angle (metaphor, example, formal definition). Then write a fourth attempt that identifies what the first three were missing. Reflect: did the act of writing change your understanding of the idea itself?" },
  { section:"Language & Communication", title:"The Misunderstanding That Taught You Something", tag:"Philosophy", tagClass:"tag-phi", prompt:"Recall a real moment when you were misunderstood — or you misunderstood someone else — and it mattered. Reconstruct the conversation in writing. Identify exactly which word, assumption, or omission caused the gap. Then write a one-paragraph principle for clearer communication that the misunderstanding revealed, and test it against a second example." },
  { section:"Ethics & Philosophy", title:"Create a Moral Dilemma, Not a Trolley Problem", tag:"Philosophy", tagClass:"tag-phi", prompt:"Invent an original ethical dilemma — not a classic one — that has no clean answer. It must involve real competing values, not a trick. Share it with someone and record their reasoning. What does it reveal?" },
  { section:"Ethics & Philosophy", title:"Who Gets to Decide?", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Pick a controversial decision being made in your city or country. Map all the stakeholders. Argue who should have final say and why — using political philosophy, not just opinion. Acknowledge the strongest objection to your view." },
  { section:"Ethics & Philosophy", title:"The Rights of Future People", tag:"Philosophy", tagClass:"tag-phi", prompt:"Do people who don’t exist yet have rights? Construct a rigorous argument for or against, and apply it to a real policy decision (e.g. climate targets, nuclear waste storage, national debt)." },
  { section:"Ethics & Philosophy", title:"Audit a System for Bias", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Choose any system — school grading, sports seeding, a hiring process — and conduct a structured audit. Where might bias enter? What data would you need to test your hypothesis? What would a fairer version look like?" },
  { section:"Ethics & Philosophy", title:"When Should Engineers Refuse?", tag:"Philosophy", tagClass:"tag-phi", prompt:"Research a real case where engineers or scientists raised ethical objections to their own work (e.g. the Manhattan Project, VW emissions, social media ranking algorithms). Build a decision framework for when a technical professional should refuse, resign, or comply. Test your framework against a current dilemma you’re aware of." },
  { section:"Ethics & Philosophy", title:"Whose Risk, Whose Reward?", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Choose a new technology — CRISPR gene editing, autonomous vehicles, lab-grown meat, fusion power. Map who bears the risk if it fails versus who captures the reward if it succeeds. Are they the same people? Propose one structural change — legal, financial, or institutional — that would better align the two." },
  { section:"Ethics & Philosophy", title:"Engage Honestly With the View You Most Resist", tag:"Philosophy", tagClass:"tag-phi", prompt:"Identify a position or worldview you find personally difficult to take seriously. Research it from its strongest advocates — not its critics. Write a 200-word steel-man of the view in its own terms. Then write 100 words on what you still disagree with and why, being specific about which premise (not the conclusion). What changed in your understanding?" },
  { section:"Ethics & Philosophy", title:"The Belief You Held That Turned Out to Be Wrong", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Identify a substantive belief you used to hold and have since changed — about a person, a topic, a value. Reconstruct: what evidence or experience changed it? Why did the old belief feel correct at the time? Then write a short piece on what this teaches you about how confidently you should hold your current beliefs." },
  { section:"Creative & Imaginative", title:"Write a Wikipedia Article from 2074", tag:"Creative", tagClass:"tag-cre", prompt:"Choose a current technology, movement, or cultural trend. Write its future Wikipedia article, including its rise, peak, decline, and legacy. Ground every speculative claim in current evidence or logical extrapolation." },
  { section:"Creative & Imaginative", title:"Constrained Creation", tag:"Creative", tagClass:"tag-cre", prompt:"Write a story, poem, or argument of exactly 100 words that communicates something true and surprising about the world. Every word must earn its place. Then cut it to 50 words without losing the core idea." },
  { section:"Creative & Imaginative", title:"Invent a Subject That Should Exist", tag:"Social / Ethics", tagClass:"tag-soc", prompt:"Design a new school subject you believe is missing from the curriculum. Write a full rationale, a unit overview, three assessment tasks, and explain what existing subjects it draws from and why schools don’t already teach it." },
  { section:"Creative & Imaginative", title:"The Museum of Mistakes", tag:"Humanities", tagClass:"tag-hum", prompt:"Curate five ‘exhibits’ — each a famous error in science, history, art, or technology — that turned out to be surprisingly useful or generative. Write exhibit labels that explain what the mistake made possible and what it teaches about failure." },
  { section:"Creative & Imaginative", title:"Design a Living Building", tag:"Creative", tagClass:"tag-cre", prompt:"Imagine an architectural structure that grows, heals, and eventually dies. Specify the materials (mycelium? engineered timber? coral? bacterial concrete?), the lifecycle, and what the building looks like at year 5, year 50, and year 500. Describe one room in vivid detail. Defend its existence to a sceptical city planner." },
  { section:"Creative & Imaginative", title:"The Periodic Table of Something Else", tag:"Humanities", tagClass:"tag-hum", prompt:"The chemical periodic table organises elements by hidden structure — atomic number on one axis, electron shells on another. Build a similar table for something not normally organised this way: emotions, music genres, types of arguments, social movements. Justify your axes. What does the structure reveal that a simple list would hide?" },
  { section:"Creative & Imaginative", title:"The Creative Risk That Frightens You", tag:"Creative", tagClass:"tag-cre", prompt:"Identify a creative project — writing, art, music, performance, design — that you keep putting off because you might fail at it. Spend 30 focused minutes producing something, anything, toward it. Document what you made and what specifically scared you. Then plan the next 30 minutes, informed by what you learned about the resistance itself." },
  { section:"Creative & Imaginative", title:"The Failed Prototype That Should Have Been", tag:"STEM", tagClass:"tag-stem", prompt:"Find a real failed invention, prototype, or design that ultimately enabled a later breakthrough — Edison’s early batteries, the Apollo 13 CO2 filter, early jet engines, the first vaccines. Reconstruct the failure, what the team learned, and what made eventual success possible. Then propose a current technology whose failures might similarly be enabling something we can’t yet see." }
];

var PALETTES = {
  'tag-stem': { full:'#88B04B', tint:'rgba(136,176,75,0.40)',   border:'rgba(136,176,75,0.55)',   text:'#ffffff', tagBg:'rgba(255,255,255,0.22)', dark:false },
  'tag-hum':  { full:'#92A8D1', tint:'rgba(146,168,209,0.40)',  border:'rgba(146,168,209,0.55)',  text:'#ffffff', tagBg:'rgba(255,255,255,0.22)', dark:false },
  'tag-soc':  { full:'#FF6F61', tint:'rgba(255,111,97,0.40)',   border:'rgba(255,111,97,0.55)',   text:'#ffffff', tagBg:'rgba(255,255,255,0.22)', dark:false },
  'tag-cre':  { full:'#6B5B93', tint:'rgba(107,91,147,0.40)',   border:'rgba(107,91,147,0.55)',   text:'#ffffff', tagBg:'rgba(255,255,255,0.22)', dark:false },
  'tag-phi':  { full:'#b87d7a', tint:'rgba(184,125,122,0.40)',  border:'rgba(184,125,122,0.55)',  text:'#2a1218', tagBg:'rgba(61,30,42,0.15)',   dark:true  }
};

var current = 0;
var saved = {};
var now = new Date();

document.getElementById('date-display').textContent = now.toLocaleDateString('en-AU', {
  weekday:'long', day:'numeric', month:'long', year:'numeric'
});

function applyPalette(tagClass) {
  var p = PALETTES[tagClass] || PALETTES['tag-stem'];
  var r = document.documentElement;
  r.style.setProperty('--task-full',   p.full);
  r.style.setProperty('--task-tint',   p.tint);
  r.style.setProperty('--task-border', p.border);
  r.style.setProperty('--task-text',   p.text);
  r.style.setProperty('--task-tag-bg', p.tagBg);
  var top = document.getElementById('task-card-top');
  top.style.background = p.full;
  document.getElementById('task-surround').style.background = p.tint;
  document.getElementById('task-number').style.color  = p.dark ? 'rgba(42,18,24,0.55)' : 'rgba(255,255,255,0.65)';
  document.getElementById('task-title').style.color   = p.dark ? '#2a1218' : '#ffffff';
  document.getElementById('task-tag').style.background = p.tagBg;
  document.getElementById('task-tag').style.color      = p.text;
  document.getElementById('task-prompt').style.color   = p.dark ? 'rgba(42,18,24,0.85)' : 'rgba(255,255,255,0.9)';
  document.getElementById('task-prompt').style.borderLeftColor = p.dark ? 'rgba(42,18,24,0.25)' : 'rgba(255,255,255,0.3)';
  document.querySelector('.response-label').style.color = p.border;
  document.querySelector('.response-label::after') ; // CSS handles this via var
}

function render() {
  var t = TASKS[current];
  document.getElementById('task-card-top').setAttribute('data-num', String(current+1).padStart(2,'0'));

var STORAGE_KEY = 'sparkStretchThinking.v1';

function writeToStorage() {
  try {
    var data = {
      v: 1,
      name: document.getElementById('student-name').value,
      year: document.getElementById('student-year').value,
      saved: saved
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* silent — storage disabled or quota exceeded */ }
}

function loadFromStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (!data || typeof data !== 'object') return;
    if (data.saved && typeof data.saved === 'object') saved = data.saved;
    if (typeof data.name === 'string') document.getElementById('student-name').value = data.name;
    if (typeof data.year === 'string') document.getElementById('student-year').value = data.year;
  } catch (e) { /* silent — corrupt or unavailable */ }
}

function saveCurrent() {
  saved[current] = document.getElementById('response-box').value;
  writeToStorage();
}
function goTo(i) { current = i; render(); }
function navigate(dir) { saveCurrent(); current = Math.max(0, Math.min(TASKS.length-1, current+dir)); render(); }

function countWords(s) { return s.trim() === '' ? 0 : s.trim().split(/\s+/).length; }

function updateWordCounter() {
  if (current !== 17) return;
  var n = countWords(document.getElementById('response-box').value);
  document.getElementById('wc-num').textContent = n;
  var wc = document.getElementById('word-counter');
  var tgt = document.getElementById('wc-target');
  wc.classList.remove('near-50','at-100','over-100');
  if (n === 0)       tgt.textContent = ' words';
  else if (n < 50)   tgt.textContent = ' / 100 words';
  else if (n < 90)   tgt.textContent = ' / 100 words';
  else if (n < 100)  { tgt.textContent = ' / 100 words — almost there'; wc.classList.add('near-50'); }
  else if (n === 100) { tgt.textContent = ' words — exactly 100 ✓'; wc.classList.add('at-100'); }
  else               { tgt.textContent = ' words — over 100, try cutting back'; wc.classList.add('over-100'); }
}

function downloadPDF() {
  saveCurrent();
  var t = TASKS[current];
  var name = document.getElementById('student-name').value || 'Student';
  var year = document.getElementById('student-year').value || '';
  var text = saved[current] || '';
  if (!text.trim()) { notify('Write a response first, then download.'); return; }

  var W = 595.28, H = 841.89, ml = 56.7, mr = 56.7, mt = 60, mb = 60;

  // Safe PDF string
  function ps(s) {
    s = String(s)
      .replace(/[‘’]/g,"'").replace(/[“”]/g,'"')
      .replace(/—/g,'--').replace(/–/g,'-')
      .replace(/…/g,'...').replace(/[^\x20-\x7E]/g,'?');
    return s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
  }

  function wrap(text, cpl) {
    var words = text.split(' '), lines = [], line = '';
    for (var i=0;i<words.length;i++) {
      var w=words[i], test=line?line+' '+w:w;
      if (test.length>cpl) {
        if (line) lines.push(line);
        while (w.length>cpl){lines.push(w.slice(0,cpl));w=w.slice(cpl);}
        line=w;
      } else line=test;
    }
    if (line) lines.push(line);
    return lines.length?lines:[''];
  }

  // Build all page streams first, collect raw stream strings
  var pageStreams = [];
  var curStream = [], curY = H - mt;

  function checkY(need) {
    if (curY - need < mb) {
      pageStreams.push(curStream.join('\n'));
      curStream = []; curY = H - mt;
    }
  }

  function line(txt, sz, bold, r, g, b, ls) {
    sz=sz||10; ls=ls||(sz*1.5);
    r=r!==undefined?r:0; g=g!==undefined?g:0; b=b!==undefined?b:0;
    checkY(ls+2);
    curStream.push('BT '+(bold?'/F2':'/F1')+' '+sz+' Tf '+r+' '+g+' '+b+' rg '+ml+' '+curY.toFixed(2)+' Td ('+ps(txt)+') Tj ET');
    curY-=ls;
  }

  function wrapped(txt, sz, bold, r, g, b, indent, cpl) {
    sz=sz||10; indent=indent||0;
    r=r!==undefined?r:0; g=g!==undefined?g:0; b=b!==undefined?b:0;
    cpl=cpl||Math.floor((W-ml-mr-indent)/(sz*0.52));
    var lh=sz*1.5, wds=wrap(txt,cpl);
    for (var i=0;i<wds.length;i++){
      checkY(lh+2);
      curStream.push('BT '+(bold?'/F2':'/F1')+' '+sz+' Tf '+r+' '+g+' '+b+' rg '+(ml+indent)+' '+curY.toFixed(2)+' Td ('+ps(wds[i])+') Tj ET');
      curY-=lh;
    }
  }

  function rule(thick, gray) {
    thick=thick||0.5; gray=gray!==undefined?gray:0.8;
    checkY(6);
    curStream.push(gray+' G '+thick+' w '+ml+' '+curY.toFixed(2)+' m '+(W-mr)+' '+curY.toFixed(2)+' l S');
    curY-=8;
  }

  function space(n){curY-=(n||6);}

  // ── Content ──
  line('STRETCH TASKS', 8, false, 0.6,0.6,0.6, 12);
  line('Gifted Learners - Years 6-10', 8, false, 0.6,0.6,0.6, 14);
  rule(1, 0.1);
  space(4);
  line('Task '+(current+1)+' of '+TASKS.length, 9, false, 0.5,0.5,0.5, 14);
  wrapped(t.title, 15, true, 0,0,0, 0);
  space(2);
  line('['+t.tag+']', 8, false, 0.45,0.45,0.45, 14);
  space(8);
  line('PROMPT', 7, true, 0.55,0.55,0.55, 12);
  rule(0.5, 0.82);
  wrapped(t.prompt, 10, false, 0.2,0.2,0.2, 0);
  space(12);
  rule(0.5, 0.82);
  var sl='Name: '+name+(year?'   Year: '+year:'')+'   Date: '+now.toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  line(sl, 8.5, false, 0.35,0.35,0.35, 14);
  space(10);
  line('RESPONSE', 7, true, 0.55,0.55,0.55, 12);
  rule(0.5, 0.82);
  space(2);
  var paras=text.split('\n');
  for (var pi=0;pi<paras.length;pi++){
    var para=paras[pi].trim();
    if(!para){space(5);}
    else{wrapped(para,11,false,0,0,0,0);space(3);}
  }
  pageStreams.push(curStream.join('\n')); // flush last page

  // ── Assemble PDF with CORRECT object order ──
  // Pre-assign object numbers:
  // 1 = Catalog, 2 = Pages, 3 = F1, 4 = F2
  // 5..4+N = content streams, 5+N..4+2N = page objects
  var N = pageStreams.length;
  var f1Num=3, f2Num=4;
  var streamNums=[], pageNums=[];
  for(var i=0;i<N;i++) streamNums.push(5+i);
  for(var i=0;i<N;i++) pageNums.push(5+N+i);
  var totalObjs = 4 + N*2;

  var parts=['%PDF-1.4'];
  var offsets={}; // objNum -> byte offset

  function emit(num, body) {
    offsets[num] = parts.join('\n').length + 1;
    parts.push(num+' 0 obj');
    parts.push(body);
    parts.push('endobj\n');
  }

  // Object 1: Catalog
  emit(1, '<</Type /Catalog /Pages 2 0 R>>');

  // Object 2: Pages (need all page refs)
  var kidsStr = pageNums.map(function(n){return n+' 0 R';}).join(' ');
  emit(2, '<</Type /Pages /Kids ['+kidsStr+'] /Count '+N+'>>');

  // Objects 3,4: Fonts
  emit(3, '<</Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding>>');
  emit(4, '<</Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding>>');

  // Content streams
  for(var i=0;i<N;i++){
    var s=pageStreams[i];
    emit(streamNums[i], '<</Length '+s.length+'>>\nstream\n'+s+'\nendstream');
  }

  // Page objects
  var resources = '<</Font <</F1 3 0 R /F2 4 0 R>>>>';
  var mediaBox = '[0 0 '+W+' '+H+']';
  for(var i=0;i<N;i++){
    emit(pageNums[i], '<</Type /Page /Parent 2 0 R /MediaBox '+mediaBox+' /Contents '+streamNums[i]+' 0 R /Resources '+resources+'>>');
  }

  // xref table
  var xrefOffset = parts.join('\n').length + 1;
  parts.push('xref');
  parts.push('0 '+(totalObjs+1));
  parts.push('0000000000 65535 f ');
  for(var n=1;n<=totalObjs;n++){
    parts.push(String(offsets[n]).padStart(10,'0')+' 00000 n ');
  }
  parts.push('trailer');
  parts.push('<</Size '+(totalObjs+1)+' /Root 1 0 R>>');
  parts.push('startxref');
  parts.push(xrefOffset);
  parts.push('%%EOF');

  var pdfText = parts.join('\n');
  var filename = 'Task'+String(current+1).padStart(2,'0')+'_'+name.replace(/\s+/g,'_')+'.pdf';

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    var bytes=[];
    for(var ci=0;ci<pdfText.length;ci++) bytes.push(pdfText.charCodeAt(ci)&0xff);
    var b64=btoa(String.fromCharCode.apply(null,bytes));
    var uri='data:application/pdf;base64,'+b64;
    var win=window.open(uri,'_blank');
    if(!win){var a=document.createElement('a');a.href=uri;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);}
    notify('PDF opened – tap Share → Save to Files ✓');
  } else {
    var blob=new Blob([pdfText],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    notify('PDF downloaded ✓');
  }
}

    if(!win){var a=document.createElement('a');a.href=uri;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);}
    notify('All responses opened – tap Share → Save to Files ✓');
  } else {
    var blob=new Blob([pdfText],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    notify('All '+completed.length+' responses downloaded ✓');
  }
}

loadFromStorage();
buildNav();
render();
</script>
